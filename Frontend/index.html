<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontSize: {
            'xxs': '0.65rem',
          },
          colors: {
            'app-bg-light': '#ffffff',
            'app-bg-dark': '#0a0a0a',
            'app-text-light': '#6b7280', // Gray font for light mode
            'app-text-dark': '#a3a3a3',
          },
          borderRadius: {
            'xl': '0.75rem',
            '2xl': '1rem',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Premium Toast Customization */
    :root {
      --toastify-font-family: 'Inter', sans-serif;
      --toastify-toast-width: 240px;
      --toastify-toast-min-height: 38px;
    }

    .Toastify__toast {
      background: rgba(255, 255, 255, 0.8) !important;
      color: #737373 !important;
      border: 1px solid #f5f5f5 !important;
      min-height: var(--toastify-toast-min-height) !important;
      margin-bottom: 0.5rem !important;
      backdrop-filter: blur(8px);
    }

    .dark .Toastify__toast {
      background: rgba(10, 10, 10, 0.8) !important;
      color: #a3a3a3 !important;
      border: 1px solid #171717 !important;
    }

    .Toastify__toast--success .Toastify__toast-icon svg {
      fill: #10b981 !important;
      width: 14px;
      height: 14px;
    }

    .Toastify__toast--error .Toastify__toast-icon svg {
      fill: #f43f5e !important;
      width: 14px;
      height: 14px;
    }

    .Toastify__close-button {
      color: currentColor !important;
      opacity: 0.5;
      padding: 0 4px !important;
    }

    .Toastify__toast-body {
      margin: 0 !important;
      padding: 4px 10px !important;
      font-size: 10px !important;
      font-weight: 600 !important;
      letter-spacing: 0.025em !important;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom": "https://esm.sh/react-dom@^19.2.4",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.4/client",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.1.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body
  class="transition-colors duration-200 bg-white dark:bg-neutral-950 text-neutral-600 dark:text-neutral-400 overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
